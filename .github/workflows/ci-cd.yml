name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # QUALITÉ DU CODE
  lint-and-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install Dependencies
        run: |
          cd frontend && npm ci
          cd ../backend && npm ci

      - name: Check Linting & TS (Frontend)
        run: cd frontend && npm run lint && npx tsc --noEmit

      - name: Check Linting & TS (Backend)
        run: cd backend && npm run typecheck

  # TESTS
  test:
    needs: lint-and-types
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install Dependencies
        run: |
          cd frontend && npm ci
          cd ../backend && npm ci

      - name: Run Backend Tests (Jest)
        env:
          MONGO_URI: mongodb://localhost:27017/rh-portal
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: 5000
          NODE_ENV: test
        run: cd backend && npm test

      - name: Install Playwright Browsers (Frontend E2E)
        run: cd frontend && npx playwright install --with-deps

      - name: Run E2E Tests (Playwright)
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: cd frontend && npm run test:e2e

  # BUILD
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install Dependencies
        run: |
          cd frontend && npm ci
          cd ../backend && npm ci

      - name: Build Backend
        run: cd backend && npm run build

      - name: Build Frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: cd frontend && npm run build
