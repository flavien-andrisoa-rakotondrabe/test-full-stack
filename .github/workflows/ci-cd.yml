name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # QUALITÉ DU CODE
  lint-and-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Root Dependencies
        run: npm install && cd backend && npm install && cd ../frontend && npm install

      - name: Check Linting & TS (Frontend)
        run: cd frontend && npm run lint && npx tsc --noEmit

      - name: Check Linting & TS (Backend)
        run: cd backend && npx tsc --noEmit

  # TESTS
  test:
    needs: lint-and-types
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install && cd backend && npm install && cd ../frontend && npm install

      - name: Run Backend Tests (Jest)
        env:
          path: .env
        run: cd backend && npm test

      - name: Install Playwright Browsers (Frontend E2E)
        run: cd frontend && npx playwright install --with-deps

      - name: Run E2E Tests (Playwright)
        run: cd frontend && npm run test:e2e

  # BUILD
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Build Backend
        run: cd backend && npm run build

      - name: Build Frontend
        env:
          path: .env
        run: cd frontend && npm run build
